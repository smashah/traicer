name: release

on:
  push:
    branches: [main]

concurrency:
  group: bumpy-release-main
  cancel-in-progress: false

jobs:
  verify:
    uses: ./.github/workflows/ci.yml
    with:
      ref: ${{ github.sha }}
    permissions:
      contents: read

  plan:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      mode: ${{ steps.plan.outputs.mode }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.1
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - id: plan
        run: pnpm exec bumpy ci plan

  version-pr:
    if: needs.plan.outputs.mode == 'version-pr'
    needs: plan
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.1
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec bumpy ci release --expect-mode version-pr
        env:
          BUMPY_GH_TOKEN: ${{ secrets.BUMPY_GH_TOKEN }}
          GH_TOKEN: ${{ github.token }}

  publish-cli:
    if: needs.plan.outputs.mode == 'publish'
    needs: plan
    runs-on: ubuntu-latest
    environment: publish
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.1
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @traice/traicer test
      - run: pnpm --filter @traice/traicer typecheck
      - run: pnpm --filter @traice/traicer build
      - name: Use an npm version that supports trusted publishing
        run: npm install --global npm@latest
      - run: pnpm exec bumpy ci release --expect-mode publish
        env:
          BUMPY_GH_TOKEN: ${{ secrets.BUMPY_GH_TOKEN }}
          GH_TOKEN: ${{ github.token }}
