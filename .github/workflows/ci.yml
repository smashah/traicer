name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10.28.1 }
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: 1.3.5 }
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm --filter @traice/daemon build
      - name: Reject imports from reference source trees
        run: '! grep -R --line-number --include="*.ts" --include="*.tsx" -E "from [^;]*(repos/effect|\.\./repos/)" apps packages'
