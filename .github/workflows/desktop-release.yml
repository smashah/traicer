name: desktop release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing @traice-market/traicer GitHub release tag
        required: true
        type: string

concurrency:
  group: desktop-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  release-context:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - id: release
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          case "$RELEASE_TAG" in
            @traice-market/traicer@*) ;;
            *) echo "Expected an @traice-market/traicer@<version> release tag" >&2; exit 1 ;;
          esac
          echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "version=${RELEASE_TAG##*@}" >> "$GITHUB_OUTPUT"

  verify:
    needs: release-context
    uses: ./.github/workflows/ci.yml
    with:
      ref: ${{ needs.release-context.outputs.tag }}
    permissions:
      contents: read

  package:
    needs: [release-context, verify]
    env:
      APPLE_SIGNING_CONFIGURED: ${{ secrets.APPLE_CERTIFICATE != '' && secrets.APPLE_CERTIFICATE_PASSWORD != '' && secrets.APPLE_SIGNING_IDENTITY != '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            bun_target: bun-darwin-arm64
            rust_target: aarch64-apple-darwin
            bundle: app,dmg
          - os: macos-13
            bun_target: bun-darwin-x64
            rust_target: x86_64-apple-darwin
            bundle: app,dmg
          - os: windows-2025
            bun_target: bun-windows-x64
            rust_target: x86_64-pc-windows-msvc
            bundle: nsis,msi
          - os: ubuntu-24.04
            bun_target: bun-linux-x64
            rust_target: x86_64-unknown-linux-gnu
            bundle: deb,appimage
    runs-on: ${{ matrix.os }}
    environment: release
    permissions:
      attestations: write
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-context.outputs.tag }}
      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.1
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
          targets: ${{ matrix.rust_target }}
      - if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libayatana-appindicator3-dev librsvg2-dev libwebkit2gtk-4.1-dev patchelf
      - run: pnpm install --frozen-lockfile
      - name: Compile target sidecar
        shell: bash
        run: |
          extension=""
          if [[ "${{ runner.os }}" == "Windows" ]]; then extension=".exe"; fi
          mkdir -p apps/desktop/src-tauri/binaries
          bun build apps/daemon/src/index.ts --compile --no-compile-autoload-dotenv --no-compile-autoload-bunfig --target=${{ matrix.bun_target }} --outfile=apps/desktop/src-tauri/binaries/traicer-daemon-${{ matrix.rust_target }}${extension}
      - name: Package Apple-signed native installer
        if: runner.os == 'macOS' && env.APPLE_SIGNING_CONFIGURED == 'true'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm --filter @traice/desktop exec tauri build --target ${{ matrix.rust_target }} --bundles ${{ matrix.bundle }} --ci --config '{"version":"${{ needs.release-context.outputs.version }}","bundle":{"icon":["icons/32x32.png","icons/128x128.png","icons/128x128@2x.png","icons/icon.icns","icons/icon.ico"]}}'
      - name: Package native preview installer
        if: runner.os != 'macOS' || env.APPLE_SIGNING_CONFIGURED != 'true'
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm --filter @traice/desktop exec tauri build --target ${{ matrix.rust_target }} --bundles ${{ matrix.bundle }} --ci --config '{"version":"${{ needs.release-context.outputs.version }}","bundle":{"icon":["icons/32x32.png","icons/128x128.png","icons/128x128@2x.png","icons/icon.icns","icons/icon.ico"]}}'
      - name: Generate checksums
        shell: bash
        run: |
          bash apps/desktop/scripts/stage-release-assets.sh ${{ matrix.rust_target }}
          find apps/desktop/release-assets/${{ matrix.rust_target }} -type f ! -name '*.sig' ! -name 'checksums-*' -print0 | xargs -0 shasum -a 256 > apps/desktop/release-assets/${{ matrix.rust_target }}/checksums-${{ matrix.rust_target }}.txt
      - uses: anchore/sbom-action@v0
        with:
          path: apps/desktop/src-tauri/target/${{ matrix.rust_target }}/release/bundle
          format: cyclonedx-json
          output-file: apps/desktop/release-assets/${{ matrix.rust_target }}/sbom-${{ matrix.rust_target }}.cdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: traicer-${{ matrix.rust_target }}
          path: apps/desktop/release-assets/${{ matrix.rust_target }}
      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: apps/desktop/release-assets/${{ matrix.rust_target }}/*

  publish-assets:
    needs: [release-context, package]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-context.outputs.tag }}
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
      - name: Create signed updater manifest
        env:
          GITHUB_REF_NAME: ${{ needs.release-context.outputs.tag }}
        run: bash apps/desktop/scripts/create-update-manifest.sh release-artifacts
      - name: Attach installers to the CLI release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.release-context.outputs.tag }}
        run: find release-artifacts -type f -print0 | xargs -0 gh release upload "$RELEASE_TAG" --clobber
